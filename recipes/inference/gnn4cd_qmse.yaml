id_dir: ./outputs/gnn4cd_qmse

d4d_downscaler:
  name: d4d_downscaler_custom
  module: deep4production.core.downscalers.downscaler_gnn4cd

input_data:
  paths:
    - ./AI_ready_datasets/files/UPSRCM_1961-1980.zarr
    - ./AI_ready_datasets/files/UPSRCM_2080-2099.zarr
  years: [1980]
  load_in_memory: true

ensemble_size: 2
model_file: gnn4cd_qmse_best.pt # Model at: id_dir/models/

graph: 
  path: edge_index.pt
